<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lista 2026 • Acesso</title>
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/ css/login.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="container animate-in">
        <div class="brand">
            <img id="logo" src="src/icons/icon-512x512.png" alt="Lista 2026">
            <h1 class="app-name">Lista<span>2026</span></h1>
            <p class="tagline">Suas compras, organizadas em qualquer lugar</p>
        </div>

        <form id="loginForm" action="javascript:void(0);">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••" autocomplete="current-password"
                    required>
                <span class="error-message" id="senhaError"></span>
            </div>

            <div class="options-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember"> Lembrar-me
                </label>
                <a href="#" id="forgotPassword" class="link-forgot">Esqueceu a senha?</a>
            </div>

            <div class="botoes">
                <button type="submit" id="btnLogin" class="btn-primary">
                    <span class="btn-text">Entrar</span>
                    <div class="spinner hidden"></div>
                </button>
                <button type="button" id="btnCadastro" class="btn-secondary">Criar nova conta</button>
            </div>
        </form>

        <div class="footer-note">
            <p>Ao continuar, você aceita nossos <a href="#">Termos</a> e <a href="#">Privacidade</a>.</p>
        </div>
    </div>

    <!-- Seu auth.js original continua sendo importado -->
    <script type="module" src="auth.js"></script>

    <script>
        // ============================================
        // CÓDIGO DE INTEGRAÇÃO COM SUPABASE
        // Preservando sua lógica original
        // ============================================

        // Elementos do DOM
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const senhaInput = document.getElementById('senha');
        const btnLogin = document.getElementById('btnLogin');
        const btnCadastro = document.getElementById('btnCadastro');
        const spinner = btnLogin.querySelector('.spinner');
        const btnText = btnLogin.querySelector('.btn-text');

        // Função de validação (apenas visual, não interfere no Supabase)
        function validateForm() {
            let isValid = true;
            const emailError = document.getElementById('emailError');
            const senhaError = document.getElementById('senhaError');

            emailError.textContent = '';
            senhaError.textContent = '';

            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailError.textContent = 'Insira um e-mail válido.';
                isValid = false;
            }

            if (!senhaInput.value || senhaInput.value.length < 4) {
                senhaError.textContent = 'A senha deve ter pelo menos 4 caracteres.';
                isValid = false;
            }

            return isValid;
        }

        // Handler do login - CHAMA SUA FUNÇÃO ORIGINAL
        async function handleLogin(e) {
            e.preventDefault();

            // Validação visual (opcional - pode remover se quiser)
            if (!validateForm()) return;

            // Mostrar loader
            btnLogin.disabled = true;
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                // ============================================
                // AQUI VOCÊ CHAMA SUA FUNÇÃO ORIGINAL DO SUPABASE
                // Substitua pelo seu código original
                // ============================================

                // Opção 1: Se sua função login() está no escopo global
                if (typeof login === 'function') {
                    await login(emailInput.value, senhaInput.value);
                }
                // Opção 2: Se você usa Supabase diretamente (descomente e ajuste)
                // else if (window.supabase) {
                //     const { data, error } = await window.supabase.auth.signInWithPassword({
                //         email: emailInput.value,
                //         password: senhaInput.value,
                //     });
                //     if (error) throw error;
                //     window.location.href = 'index.html';
                // }
                // Opção 3: Se a lógica está no auth.js (import type="module")
                else {
                    console.log('Chamando login do auth.js');
                    // Importe dinamicamente se necessário
                    const { login: supabaseLogin } = await import('./auth.js');
                    await supabaseLogin(emailInput.value, senhaInput.value);
                }

            } catch (error) {
                console.error('Erro no login:', error);
                // Mostrar erro visualmente
                const senhaError = document.getElementById('senhaError');
                senhaError.textContent = error.message || 'Erro ao fazer login. Verifique suas credenciais.';

                // Resetar loader
                btnLogin.disabled = false;
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        // Handler do cadastro - CHAMA SUA FUNÇÃO ORIGINAL
        function handleCadastro() {
            // ============================================
            // AQUI VOCÊ CHAMA SUA FUNÇÃO ORIGINAL DE CADASTRO
            // ============================================

            // Opção 1: Função global
            if (typeof cadastro === 'function') {
                cadastro();
            }
            // Opção 2: Redirecionar para página de cadastro
            else {
                window.location.href = 'cadastro.html';
            }
        }

        // Event listeners
        form.addEventListener('submit', handleLogin);
        btnCadastro.addEventListener('click', handleCadastro);

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => console.log('ServiceWorker registrado:', registration.scope))
                    .catch(error => console.log('Falha no ServiceWorker:', error));
            });
        }
    </script>
</body>

</html>
